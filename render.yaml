# Render Blueprint for the FastAPI backend.
# Deploy: push this repo to GitHub → Render → New + → Blueprint → pick this repo.
services:
  - type: web
    name: my-match-olympics-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: GROQ_API_KEY
        sync: false        # set in the Render dashboard (optional)
      - key: ALLOWED_ORIGINS
        sync: false        # e.g. https://my-match-olympics.vercel.app
